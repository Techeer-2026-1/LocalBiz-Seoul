name: ✨ Feature
description: 새 기능 제안 — plan 작성이 필수
labels: ["feature", "needs-plan"]
body:
  - type: markdown
    attributes:
      value: |
        > **plan-driven 워크플로**: feature 이슈는 코드 작성 전에 `.sisyphus/plans/{YYYY-MM-DD}-{slug}/plan.md` 작성 필수.
        > `localbiz-plan` 스킬이 자동 발동하지만, 이슈 단계에서 미리 slug 합의하면 추적 단순.

  - type: textarea
    id: motivation
    attributes:
      label: 왜 (motivation)
      description: 이 기능이 왜 필요한가? 사용자 시나리오 1~2개
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: 요구사항
      description: 이 기능이 무엇을 해야 하는가
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - P1 (핵심 — 의도/장소/행사/코스/예약)
        - P2 (확장 — 분석/북마크/공유/이미지)
        - P3 (피드백)
        - ETL
        - Infra/하네스
    validations:
      required: true

  - type: dropdown
    id: invariant_impact
    attributes:
      label: 19 불변식 영향
      multiple: true
      options:
        - 영향 없음 (인프라/문서)
        - PK 이원화
        - PG↔OS 동기화
        - append-only 4테이블
        - 소프트 삭제 매트릭스
        - 의도적 비정규화
        - 6 지표 스키마
        - 임베딩 768d
        - asyncpg 바인딩
        - Optional[str]
        - WS 블록 16종
        - intent별 블록 순서
        - 공통 쿼리 전처리
        - 행사 검색 순서
        - 대화 이력 이원화
        - 인증 매트릭스
        - 북마크 패러다임
        - 공유링크 인증
        - 기획 문서 우선
    validations:
      required: true

  - type: input
    id: plan_slug
    attributes:
      label: plan slug (선택)
      placeholder: 2026-04-15-place-recommend-node
      description: plan 작성 후 채워주세요. 이슈 close 시 plan APPROVED 필수.

  - type: textarea
    id: scope_out
    attributes:
      label: 범위 외 (out of scope)
      description: 이 이슈에서 의식적으로 *안* 할 것
