name: 🔧 Chore
description: 리팩토링·문서·CI·인프라·의존성 (사용자 가시 기능 변경 없음)
labels: ["chore"]
body:
  - type: textarea
    id: what
    attributes:
      label: 무엇
      placeholder: 어떤 작업을 할지
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 왜
      description: 왜 지금 필요한가? 부채/사고/규약 변경?
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: 종류
      options:
        - refactor (코드 구조)
        - docs (문서)
        - ci (GitHub Actions)
        - deps (의존성 업그레이드/추가)
        - infra (하네스/hook/skill/.sisyphus)
        - test (테스트만)
        - cleanup (legacy 제거)
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: 검증 방법
      placeholder: validate.sh / 수동 시나리오 / CI green
